<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- PapaParse (CSV Parser) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
        
        /* 테이블 스크롤바 커스텀 */
        .table-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-white bg-opacity-90 z-50 flex flex-col justify-center items-center">
        <i class="fa-solid fa-circle-notch fa-spin text-5xl text-red-500 mb-4"></i>
        <h2 class="text-xl font-semibold text-gray-700">데이터를 불러오는 중입니다...</h2>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        
        <!-- Header -->
        <header class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-yellow-500 to-blue-500 flex items-center gap-3">
                    <i class="fa-solid fa-city" style="background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; color: transparent;"></i>
                    우리 동네 아파트 실거래가 대시보드
                </h1>
                <p class="mt-2 text-sm text-gray-500">최신 아파트 실거래 데이터를 분석하여 제공합니다.</p>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- Total Transactions -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center">
                <div class="p-3 rounded-full bg-red-100 text-red-600 mr-4">
                    <i class="fa-solid fa-file-contract fa-lg"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500 mb-1">전체 거래 건수</p>
                    <p class="text-2xl font-bold text-red-700" id="stat-total">-</p>
                </div>
            </div>
            
            <!-- Avg Price -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center">
                <div class="p-3 rounded-full bg-orange-100 text-orange-600 mr-4">
                    <i class="fa-solid fa-money-bill-trend-up fa-lg"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500 mb-1">평균 거래가격</p>
                    <p class="text-xl font-bold text-orange-700" id="stat-avg">-</p>
                </div>
            </div>

            <!-- Max Price -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center">
                <div class="p-3 rounded-full bg-green-100 text-green-600 mr-4">
                    <i class="fa-solid fa-arrow-trend-up fa-lg"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500 mb-1">최고 거래가격</p>
                    <p class="text-xl font-bold text-green-700" id="stat-max">-</p>
                </div>
            </div>

            <!-- Min Price -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center">
                <div class="p-3 rounded-full bg-blue-100 text-blue-600 mr-4">
                    <i class="fa-solid fa-arrow-trend-down fa-lg"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500 mb-1">최저 거래가격</p>
                    <p class="text-xl font-bold text-blue-700" id="stat-min">-</p>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-8">
            <h2 class="text-lg font-bold text-gray-800 mb-4"><i class="fa-solid fa-chart-line mr-2"></i>월별 평균 거래가격 추이</h2>
            <div class="relative h-[350px] w-full">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-100 bg-gray-50">
                <h2 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-table-list mr-2"></i>최근 거래 목록</h2>
            </div>
            <div class="table-container overflow-y-auto max-h-[500px]">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">거래일자</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">아파트명</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">법정동</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">전용면적(㎡)</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">층</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">건축년도</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-bold text-gray-700 uppercase tracking-wider">거래금액(만원)</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="bg-white divide-y divide-gray-200">
                        <!-- Data rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 구글 시트 CSV URL
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSSLMRWfuXabV7qdvEEBFR3uaYz18F2R1H1OEZMfh4Ibge3ClgMzAuWTBq_FhNwpfNRrjl_uACCQWRV/pub?gid=0&single=true&output=csv";

        // 한국 통화(억원 단위) 포맷터
        function formatPrice(manwon) {
            if (isNaN(manwon)) return "-";
            const num = Number(manwon);
            const uk = Math.floor(num / 10000);
            const remainder = num % 10000;
            
            if (uk > 0) {
                return `${uk}억 ${remainder > 0 ? remainder.toLocaleString() + '만' : ''}원`.trim();
            }
            return `${num.toLocaleString()}만원`;
        }

        // 날짜 파싱 유틸리티 (다양한 형식을 YYYY-MM 로 표준화)
        function getMonthKey(dateString) {
            if (!dateString) return null;
            // "2023-10-01", "2023. 10. 1", "2023/10/01" 등 매칭
            const match = String(dateString).trim().match(/^(\d{4})[-./\s]+(\d{1,2})/);
            if (match) {
                const year = match[1];
                const month = match[2].padStart(2, '0');
                return `${year}-${month}`;
            }
            return null;
        }

        // 데이터 처리 및 UI 렌더링
        function initDashboard() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    
                    // 유효한 데이터 필터링 및 전처리
                    const processedData = data.map(row => {
                        const priceStr = row['거래금액(만원)'] || "0";
                        const priceNum = Number(priceStr.replace(/,/g, '').trim());
                        return {
                            ...row,
                            parsedPrice: priceNum,
                            monthKey: getMonthKey(row['거래일자'])
                        };
                    }).filter(row => row.parsedPrice > 0); // 거래금액이 있는 항목만

                    renderSummary(processedData);
                    renderChart(processedData);
                    renderTable(processedData);

                    // 로딩 오버레이 숨기기
                    document.getElementById('loading').style.display = 'none';
                },
                error: function(error) {
                    console.error("데이터를 불러오는 중 오류가 발생했습니다:", error);
                    alert("데이터를 불러오지 못했습니다. URL을 확인해주세요.");
                    document.getElementById('loading').style.display = 'none';
                }
            });
        }

        // 요약 통계 렌더링
        function renderSummary(data) {
            if (data.length === 0) return;

            let totalCount = data.length;
            let sumPrice = 0;
            let maxPrice = -Infinity;
            let minPrice = Infinity;

            data.forEach(row => {
                const price = row.parsedPrice;
                sumPrice += price;
                if (price > maxPrice) maxPrice = price;
                if (price < minPrice) minPrice = price;
            });

            const avgPrice = Math.round(sumPrice / totalCount);

            document.getElementById('stat-total').innerText = `${totalCount.toLocaleString()}건`;
            document.getElementById('stat-avg').innerText = formatPrice(avgPrice);
            document.getElementById('stat-max').innerText = formatPrice(maxPrice);
            document.getElementById('stat-min').innerText = formatPrice(minPrice);
        }

        // 월별 차트 렌더링
        function renderChart(data) {
            const monthlyData = {};

            // 월별 데이터 집계
            data.forEach(row => {
                const mk = row.monthKey;
                if (mk) {
                    if (!monthlyData[mk]) {
                        monthlyData[mk] = { sum: 0, count: 0 };
                    }
                    monthlyData[mk].sum += row.parsedPrice;
                    monthlyData[mk].count += 1;
                }
            });

            // 시간순 정렬
            const sortedMonths = Object.keys(monthlyData).sort();
            const labels = sortedMonths;
            const avgData = sortedMonths.map(month => {
                return Math.round(monthlyData[month].sum / monthlyData[month].count);
            });

            // Chart.js 초기화 (무지개색 그라데이션 적용)
            const canvas = document.getElementById('priceChart');
            const ctx = canvas.getContext('2d');
            
            const gradientStroke = ctx.createLinearGradient(0, 0, canvas.clientWidth, 0);
            gradientStroke.addColorStop(0, "#ef4444");   // Red
            gradientStroke.addColorStop(0.2, "#f97316"); // Orange
            gradientStroke.addColorStop(0.4, "#eab308"); // Yellow
            gradientStroke.addColorStop(0.6, "#22c55e"); // Green
            gradientStroke.addColorStop(0.8, "#3b82f6"); // Blue
            gradientStroke.addColorStop(1, "#a855f7");   // Purple

            const gradientFill = ctx.createLinearGradient(0, 0, 0, canvas.clientHeight);
            gradientFill.addColorStop(0, "rgba(168, 85, 247, 0.2)"); 
            gradientFill.addColorStop(1, "rgba(239, 68, 68, 0)"); 

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '월별 평균 거래가격 (만원)',
                        data: avgData,
                        borderColor: gradientStroke,
                        backgroundColor: gradientFill,
                        borderWidth: 3,
                        pointBackgroundColor: '#a855f7',
                        pointBorderColor: '#ffffff',
                        pointHoverBackgroundColor: '#ffffff',
                        pointHoverBorderColor: '#ef4444',
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        label += formatPrice(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return formatPrice(value);
                                }
                            },
                            grid: { color: '#f3f4f6' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // 테이블 렌더링
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            // 최신 거래일자 순으로 정렬
            const sortedData = [...data].sort((a, b) => {
                const dateA = new Date(a['거래일자'].replace(/\./g, '-'));
                const dateB = new Date(b['거래일자'].replace(/\./g, '-'));
                return dateB - dateA;
            });

            sortedData.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors duration-150";

                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${row['거래일자'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${row['아파트명'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${row['법정동'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 text-right">${row['전용면적(㎡)'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 text-right">${row['층'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 text-right">${row['건축년도'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-purple-600 text-right">${formatPrice(row.parsedPrice)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 페이지 로드 시 대시보드 초기화
        window.addEventListener('DOMContentLoaded', initDashboard);

    </script>
</body>
</html>
